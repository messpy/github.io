<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRChat Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #1a237e;
        }
        .links {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .link-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.15s, box-shadow 0.15s;
            display: block;
        }
        .link-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .link-card h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        .link-card .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .link-card p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: #e3f2fd;
            color: #0d47a1;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VRChat Tools</h1>
        <div class="links">
            <a href="./vrcinfo/" class="link-card">
                <div class="icon">🖼️</div>
                <h2>VRC Info Analyzer</h2>
                <p>VRChat画像のメタデータ（XMP / EXIF / PNG text）をブラウザ上で解析・表示します</p>
                <span class="badge">メタデータ解析</span>
            </a>
            <a href="./roragotchi/" class="link-card">
                <div class="icon">🥚</div>
                <h2>ろらごっち</h2>
                <p>ローカル保存のたまごっち風ゲーム。卵→あたため→孵化→成長</p>
                <span class="badge">ミニゲーム</span>
            </a>
        </div>
    </div>
</body>
</html>
